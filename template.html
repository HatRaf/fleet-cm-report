  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  "<!DOCTYPE html>\n<html lang=\"en\"><head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Fleet Condition Monitoring Report<\/title>\n  <style>/* ==========================================================================\n   HAT Analytics \u2014 Core design tokens (colors + type)\n   ========================================================================== */\n\n@font-face {\n  font-family: \"Manrope\";\n  src: url(\"ae2861ba-64e3-45d8-9857-07df6fe21491\") format(\"truetype-variations\");\n  font-weight: 200 800;\n  font-style: normal;\n  font-display: swap;\n}\n\n:root {\n  /* ---- Brand palette (sourced from Figma) ---- */\n  --ocean-cyan:    #00AABC;  /* primary brand \u2014 signal, links, active nav */\n  --ocean-cyan-alt:#00BAC6;  /* secondary teal \u2014 bar-chart fills, hovers */\n  --pastel-aqua:   #8DC8CD;  /* soft accent */\n  --frosty-blue:   #DEF2F4;  /* teal surface tint \u2014 chips, pill bgs */\n  --deep-navy:     #16181A;  /* primary ink \u2014 headings */\n  --midnight-green:#242424;  /* dark sidebar background */\n  --slate-gray:    #667085;  /* secondary ink \u2014 sub-labels, meta */\n\n  /* Status colors (from Figma status palette) */\n  --status-normal:   #439B38; /* green */\n  --status-warning:  #EBB71A; /* yellow */\n  --status-alert:    #DD7814; /* orange */\n  --status-critical: #D2393C; /* red */\n  --status-critical-strong: #CF2637;\n  --status-critical-bg: #F8E9EB;\n\n  /* Gradient stops (from reference palette) */\n  --gradient-from: #ECF4F5;\n  --gradient-to:   #165257;\n  --brand-gradient: linear-gradient(135deg, var(--gradient-from) 0%, var(--gradient-to) 100%);\n\n  /* ---- Derived / extended palette ---- */\n  --ocean-cyan-600: #008C9B;  /* hover/press on primary */\n  --ocean-cyan-100: #CCEEF1;  /* tinted backgrounds */\n  --hairline:       #DDE6E8;  /* 1px dividers on light */\n  --hairline-dark:  #0E2A30;  /* 1px dividers on dark */\n  --ink-placeholder:#8A97A0;\n\n  /* ---- Semantic colors ---- */\n  --bg:            #FFFFFF;\n  --bg-muted:      var(--frosty-blue);\n  --bg-inverse:    var(--deep-navy);\n\n  --fg1:           var(--deep-navy);     /* primary text */\n  --fg2:           var(--slate-gray);    /* secondary text */\n  --fg3:           var(--ink-placeholder);\n  --fg-inverse:    #FFFFFF;\n  --fg-accent:     var(--ocean-cyan);\n\n  --border:        var(--hairline);\n  --border-strong: var(--slate-gray);\n  --focus-ring:    var(--ocean-cyan);\n\n  --success:       #1F9D6A;\n  --warning:       #D98A1B;\n  --danger:        #D64545;\n\n  /* ---- Type ---- */\n  --font-sans: \"Manrope\", ui-sans-serif, system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  --font-mono: ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* Type scale (desktop-first, mobile can down-clamp) */\n  --fs-display: 56px;\n  --fs-h1:      40px;\n  --fs-h2:      30px;\n  --fs-h3:      22px;\n  --fs-h4:      18px;\n  --fs-body:    16px;\n  --fs-small:   14px;\n  --fs-caption: 12px;\n  --fs-eyebrow: 12px;\n\n  --lh-tight:   1.1;\n  --lh-heading: 1.2;\n  --lh-body:    1.55;\n\n  --ls-display: -0.02em;\n  --ls-heading: -0.01em;\n  --ls-body:     0em;\n  --ls-eyebrow: 0.14em;\n\n  /* ---- Spacing (4pt grid) ---- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n\n  /* ---- Radius ---- */\n  --radius-xs: 4px;\n  --radius-sm: 6px;\n  --radius-md: 10px;\n  --radius-lg: 16px;\n  --radius-xl: 24px;\n  --radius-pill: 999px;\n\n  /* ---- Shadows / elevation ---- */\n  --shadow-xs: 0 1px 2px rgba(4, 20, 32, 0.06);\n  --shadow-sm: 0 2px 6px rgba(4, 20, 32, 0.06), 0 1px 2px rgba(4, 20, 32, 0.04);\n  --shadow-md: 0 8px 24px rgba(4, 20, 32, 0.08), 0 2px 6px rgba(4, 20, 32, 0.04);\n  --shadow-lg: 0 24px 48px rgba(4, 20, 32, 0.12), 0 8px 16px rgba(4, 20, 32, 0.06);\n  --shadow-focus: 0 0 0 3px rgba(0, 170, 188, 0.28);\n\n  /* ---- Motion ---- */\n  --ease-standard: cubic-bezier(0.2, 0.8, 0.2, 1);\n  --ease-emphasized: cubic-bezier(0.2, 0.9, 0.1, 1);\n  --dur-fast: 120ms;\n  --dur-base: 200ms;\n  --dur-slow: 360ms;\n}\n\n/* ==========================================================================\n   Element-level defaults \u2014 semantic typography\n   ========================================================================== */\n\nhtml { font-family: var(--font-sans); color: var(--fg1); background: var(--bg); }\nbody { font-size: var(--fs-body); line-height: var(--lh-body); letter-spacing: var(--ls-body); -webkit-font-smoothing: antialiased; }\n\nh1, .h1 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-h1);\n  font-weight: 700;\n  line-height: var(--lh-heading);\n  letter-spacing: var(--ls-heading);\n  color: var(--fg1);\n}\n\nh2, .h2 {\n  font-size: var(--fs-h2);\n  font-weight: 700;\n  line-height: var(--lh-heading);\n  letter-spacing: var(--ls-heading);\n}\n\nh3, .h3 {\n  font-size: var(--fs-h3);\n  font-weight: 600;\n  line-height: var(--lh-heading);\n  letter-spacing: var(--ls-heading);\n}\n\nh4, .h4 {\n  font-size: var(--fs-h4);\n  font-weight: 600;\n  line-height: var(--lh-heading);\n}\n\n.display {\n  font-size: var(--fs-display);\n  font-weight: 800;\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-display);\n}\n\n.eyebrow {\n  font-size: var(--fs-eyebrow);\n  font-weight: 600;\n  letter-spacing: var(--ls-eyebrow);\n  text-transform: uppercase;\n  color: var(--ocean-cyan);\n}\n\np, .body { font-size: var(--fs-body); line-height: var(--lh-body); color: var(--fg1); }\nsmall, .small { font-size: var(--fs-small); line-height: 1.5; color: var(--fg2); }\n.caption { font-size: var(--fs-caption); line-height: 1.4; color: var(--fg2); }\n\ncode, kbd, samp, pre {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n}\n\na {\n  color: var(--ocean-cyan);\n  text-decoration: none;\n  text-underline-offset: 3px;\n  transition: color var(--dur-fast) var(--ease-standard);\n}\na:hover { color: var(--ocean-cyan-600); text-decoration: underline; }\n\n::selection { background: var(--ocean-cyan); color: #fff; }\n<\/style>\n  <script src=\"9e713481-3e05-4958-82ad-2c6e40c27bb8\"><\/script>\n  <style>\n    deck-stage:not(:defined) { visibility: hidden; }\n    body { margin: 0; background: #D8D8D6; }\n\n    /* \u2500\u2500 Light internal pages \u2500\u2500 */\n    deck-stage section {\n      background: #FFFFFF;\n      font-family: Manrope, sans-serif;\n      color: #16181A;\n      display: flex;\n      flex-direction: column;\n      overflow: hidden;\n      position: relative;\n    }\n\n    /* \u2500\u2500 Page header \u2014 dark for authority \u2500\u2500 */\n    .ph {\n      background: #242424;\n      height: 58px;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      padding: 0 52px;\n      flex-shrink: 0;\n    }\n    .ph-logo { display: flex; align-items: center; gap: 8px; }\n    .ph-logo img { height: 17px; display: block; }\n    .ph-logo-text { font-size: 13px; font-weight: 800; letter-spacing: -0.01em; color: #FFFFFF; }\n    .ph-logo-text span { color: #00AABC; }\n    .ph-right { text-align: right; font-size: 10px; color: #667085; font-weight: 600; letter-spacing: 0.04em; line-height: 1.6; }\n\n    /* \u2500\u2500 Page content \u2500\u2500 */\n    .pc { flex: 1; padding: 32px 52px; display: flex; flex-direction: column; overflow: hidden; }\n\n    /* \u2500\u2500 Section eyebrow \u2500\u2500 */\n    .sec { font-size: 10px; font-weight: 700; color: #00AABC; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 18px; }\n\n    /* \u2500\u2500 Page footer \u2500\u2500 */\n    .pf {\n      background: #F5F5F3;\n      padding: 9px 52px;\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n      flex-shrink: 0;\n      border-top: 1px solid #E8E8E6;\n    }\n    .pf span { font-size: 10px; co
